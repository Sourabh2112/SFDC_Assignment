<template>
    <lightning-card>

        <div class="wrapper">

            <!-- CENTER TITLE -->
            <div class="center-title">
                <span class="title-text">Contact Details</span>
            </div>

            <div class="container">

                <!-- LEFT PANEL -->
                <div class="section">
                    <c-form-contact record-id={recordId}></c-form-contact>
                </div>

                <!-- DIVIDER -->
                <div class="divider"></div>


                <!-- RIGHT PANEL -->
                <div class="section right-panel">
                    <c-csv-uploader mode="update"></c-csv-uploader>
                </div>


            </div>

        </div>

    </lightning-card>
</template>
