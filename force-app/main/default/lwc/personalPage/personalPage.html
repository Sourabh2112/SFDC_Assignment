<template>
    <lightning-card>

        <div class="wrapper">

            <!-- CENTER TITLE -->
            <div class="center-title">
                <span class="title-text">Personal Details</span>
            </div>

            <div class="container">

                <!-- LEFT PANEL -->
                <div class="section">
                    <c-form-personal onrefresh={handleRefresh}></c-form-personal>
                </div>

                <!-- DIVIDER -->
                <div class="divider"></div>


                <!-- RIGHT PANEL -->
                <div class="section right-panel">
                    <c-csv-uploader mode="insert" onrefresh={handleRefresh}>
                    </c-csv-uploader>
                </div>


            </div>

        </div>

    </lightning-card>
</template>
