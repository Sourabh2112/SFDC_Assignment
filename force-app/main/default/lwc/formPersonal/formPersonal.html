<template>
    <div class="slds-p-around_medium">

        <lightning-input label="First Name" data-field="First_Name__c" onchange={handleChange}></lightning-input>
        <lightning-input label="Middle Name" data-field="Middle_Name__c" onchange={handleChange}></lightning-input>
        <lightning-input label="Last Name" data-field="Last_Name__c" onchange={handleChange}></lightning-input>

        <lightning-input type="date" label="DOB" data-field="DOB__c" onchange={handleChange}></lightning-input>

        <lightning-radio-group
            label="Gender"
            options={genderOptions}
            data-field="Gender__c"
            onchange={handleChange}>
        </lightning-radio-group>

        <div class="slds-m-top_medium">
            <lightning-button label="Save" variant="brand" onclick={handleSave}></lightning-button>
            <lightning-button label="Reset" onclick={handleReset}></lightning-button>
        </div>

    </div>
</template>
