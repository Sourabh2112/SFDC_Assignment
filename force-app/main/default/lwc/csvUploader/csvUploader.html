<template>
    <lightning-card>

        <div class="slds-p-around_medium">

            <!-- FILE INPUT -->
            <lightning-input type="file" accept=".csv" label="Upload CSV File" onchange={handleFile}>
            </lightning-input>

            <!-- PREVIEW BUTTON -->
            <div class="slds-m-top_small">
                <lightning-button label="Preview" variant="brand" onclick={handlePreview}>
                </lightning-button>
            </div>

        </div>

    </lightning-card>

    <!-- PREVIEW MODAL -->
    <template if:true={showPreview}>
        <section role="dialog" class="slds-modal slds-fade-in-open slds-modal_large">
            <div class="slds-modal__container">

                <!-- HEADER -->
                <header class="slds-modal__header preview">
                    <h2 class="slds-text-heading_medium title-text">CSV Preview</h2>
                </header>

                <!-- BODY -->
                <div class="slds-modal__content slds-p-around_medium" style="height:400px; overflow:auto;">

                    <div style="min-width:900px;">
                        <lightning-datatable key-field="rowNumber" data={previewData} columns={columns}
                            hide-checkbox-column>
                        </lightning-datatable>
                    </div>

                </div>

                <!-- FOOTER -->
                <footer class="slds-modal__footer preview">
                    <lightning-button label="Close" onclick={handleClose}>
                    </lightning-button>

                    <lightning-button label= {mode} variant="brand" onclick={handleInsert}>
                    </lightning-button>
                </footer>
            </div>
        </section>

        <!-- <div class="slds-backdrop slds-backdrop_open"></div> -->
    </template>
</template>
